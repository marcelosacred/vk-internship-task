services:
  db:
    image: postgres:14
    container_name: botfarm-db
    environment:
      POSTGRES_DB: botfarm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d botfarm" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
    container_name: vk-intership-task-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: botfarm
      DB_USER: postgres
      DB_PASSWORD: postgres
      USER_LOCK_TTL_SECONDS: 300
    ports:
      - "8000:8000"

volumes:
  postgres_data:
